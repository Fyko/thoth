version: '3.7'

services:
    thoth:
        image: ghcr.io/fyko/thoth:main
        expose:
            - '21983'
        restart: unless-stopped
        env_file:
            - ./.env.prod
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:21983/health']
            interval: 10s
            timeout: 5s
            retries: 5
        labels:
            - 'com.centurylinklabs.watchtower.enable=true'

    postgres:
        build:
            context: ./docker/postgres
        environment:
            POSTGRES_USER: 'admin'
            POSTGRES_PASSWORD: 'doctordoctor'
            POSTGRES_DB: 'thoth'
            METABASE_APP_PASSWORD: ${METABASE_APP_PASSWORD}
            METABASE_READER_PASSWORD: ${METABASE_READER_PASSWORD}
        expose:
            - '5432'
        healthcheck:
            test: ['CMD', 'pg_isready', '-U', 'admin', '-d', 'thoth']
            interval: 10s
            timeout: 5s
            retries: 5
        volumes:
            - postgres-storage:/var/lib/postgresql/data
        restart: unless-stopped

    redis:
        image: redis:alpine
        restart: unless-stopped
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 10s
            timeout: 5s
            retries: 5
        expose:
            - '6379'

    metabase:
        image: metabase/metabase:latest
        restart: unless-stopped
        environment:
            MB_DB_TYPE: postgres
            MB_DB_DBNAME: thoth
            MB_DB_PORT: 5432
            MB_DB_USER: metabase_app
            MB_DB_PASS: ${METABASE_APP_PASSWORD}
            MB_DB_HOST: postgres
            MB_SITE_URL: ${METABASE_SITE_URL:-http://localhost:3000}
        expose:
            - '3000'
        depends_on:
            postgres:
                condition: service_healthy
        healthcheck:
            test: ['CMD-SHELL', 'curl -f http://localhost:3000/api/health || exit 1']
            interval: 30s
            timeout: 10s
            retries: 5
            start_period: 60s

    watchtower:
        image: containrrr/watchtower
        environment:
            - TZ=America/Denver
            - WATCHTOWER_LABEL_ENABLE=true
            - WATCHTOWER_CLEANUP=true
            - WATCHTOWER_POLL_INTERVAL=60 # 1 minute
            - WATCHTOWER_NOTIFICATIONS=slack
            - WATCHTOWER_NOTIFICATION_SLACK_HOOK_URL=${WATCHTOWER_NOTIFICATION_SLACK_HOOK_URL}
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock

volumes:
    postgres-storage:
