version: '3.7'

services:
    bot:
        build:
            context: .
            dockerfile: ./apps/bot/Dockerfile
        ports:
            - '2399:2399'
        restart: unless-stopped
        env_file:
            - ./.env.dev

    postgres:
        build:
            context: ./docker/postgres
        environment:
            POSTGRES_USER: 'admin'
            POSTGRES_PASSWORD: 'doctordoctor'
            POSTGRES_DB: 'thoth'
            METABASE_APP_PASSWORD: 'metabase_app_dev'
            METABASE_READER_PASSWORD: 'metabase_reader_dev'
        volumes:
            - postgres-storage:/var/lib/postgresql/data
        ports:
            - '5432:5432'
        restart: unless-stopped
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U admin -d thoth']
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:alpine
        restart: unless-stopped
        ports:
            - '6379:6379'

    metabase:
        image: metabase/metabase:latest
        restart: unless-stopped
        environment:
            MB_DB_TYPE: postgres
            MB_DB_DBNAME: thoth
            MB_DB_PORT: 5432
            MB_DB_USER: metabase_app
            MB_DB_PASS: metabase_app_dev
            MB_DB_HOST: postgres
            MB_SITE_URL: http://localhost:3000
        ports:
            - '3000:3000'
        depends_on:
            postgres:
                condition: service_healthy

volumes:
    postgres-storage:
